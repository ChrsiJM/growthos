{% extends "base.html" %}

{% block content %}
<div class="container-fluid px-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card mt-4">
                <div class="card-header bg-white">
                    <h4 class="mb-0">
                        <i class="fas fa-plus-circle me-2 text-primary"></i>
                        Create New Task
                    </h4>
                </div>
                <div class="card-body">
                    <form method="POST" action="{{ url_for('planner.create') }}">
                        <div class="mb-3">
                            <label for="title" class="form-label">Title *</label>
                            <input type="text" class="form-control" id="title" name="title" required 
                                   placeholder="Enter task title">
                        </div>
                        
                        <div class="mb-3">
                            <label for="description" class="form-label">Description</label>
                            <textarea class="form-control" id="description" name="description" rows="3" 
                                      placeholder="Describe your task"></textarea>
                        </div>
                        
                        <div class="mb-3">
                            <label for="planned_date" class="form-label">Planned Date *</label>
                            <input type="date" class="form-control" id="planned_date" name="planned_date" 
                                   value="{{ request.args.get('date', today.isoformat()) }}" required>
                        </div>
                        
                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('planner.index') }}" class="btn btn-secondary">
                                <i class="fas fa-arrow-left me-2"></i>Back
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save me-2"></i>Create Task
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
