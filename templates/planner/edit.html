{% extends "base.html" %}

{% block content %}
<div class="container-fluid px-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card mt-4">
                <div class="card-header bg-white">
                    <h4 class="mb-0">
                        <i class="fas fa-edit me-2 text-primary"></i>
                        Edit Task
                    </h4>
                </div>
                <div class="card-body">
                    <form method="POST" action="{{ url_for('planner.edit', task_id=task.id) }}">
                        <div class="mb-3">
                            <label for="title" class="form-label">Title *</label>
                            <input type="text" class="form-control" id="title" name="title" 
                                   value="{{ task.title }}" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="description" class="form-label">Description</label>
                            <textarea class="form-control" id="description" name="description" rows="3">{{ task.description }}</textarea>
                        </div>
                        
                        <div class="mb-3">
                            <label for="status" class="form-label">Status</label>
                            <select class="form-select" id="status" name="status">
                                <option value="Pending" {% if task.status == 'Pending' %}selected{% endif %}>Pending</option>
                                <option value="Achieved" {% if task.status == 'Achieved' %}selected{% endif %}>Achieved</option>
                                <option value="Missed" {% if task.status == 'Missed' %}selected{% endif %}>Missed</option>
                                <option value="Carried" {% if task.status == 'Carried' %}selected{% endif %}>Carried</option>
                            </select>
                        </div>
                        
                        <div class="mb-3" id="feedback-group" 
                             style="display: {% if task.status == 'Missed' %}block{% else %}none{% endif %};">
                            <label for="feedback" class="form-label">Feedback (required for missed tasks)</label>
                            <textarea class="form-control" id="feedback" name="feedback" rows="2">{{ task.feedback }}</textarea>
                        </div>
                        
                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('planner.index', date=task.planned_date.isoformat()) }}" 
                               class="btn btn-secondary">
                                <i class="fas fa-arrow-left me-2"></i>Back
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save me-2"></i>Update Task
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('status').addEventListener('change', function() {
        const feedbackGroup = document.getElementById('feedback-group');
        if (this.value === 'Missed') {
            feedbackGroup.style.display = 'block';
        } else {
            feedbackGroup.style.display = 'none';
        }
    });
</script>
{% endblock %}
