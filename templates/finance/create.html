{% extends "base.html" %}

{% block content %}
<div class="container-fluid px-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card mt-4">
                <div class="card-header bg-white">
                    <h4 class="mb-0">
                        <i class="fas fa-plus-circle me-2 text-primary"></i>
                        Add Weekly Finance Record
                    </h4>
                </div>
                <div class="card-body">
                    <form method="POST" action="{{ url_for('finance.create') }}">
                        <div class="mb-3">
                            <label for="week_start" class="form-label">Week Starting *</label>
                            <input type="date" class="form-control" id="week_start" name="week_start" 
                                   value="{{ today.isoformat() }}" required>
                            <small class="text-muted">The week will automatically end 6 days later</small>
                        </div>
                        
                        <div class="mb-3">
                            <label for="income_source" class="form-label">Income Source</label>
                            <input type="text" class="form-control" id="income_source" name="income_source"
                                   placeholder="e.g., Client project, Freelance work, etc.">
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="total_income" class="form-label">Total Income ($)</label>
                                <input type="number" step="0.01" class="form-control" id="total_income" 
                                       name="total_income" value="0">
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="total_expenses" class="form-label">Total Expenses ($)</label>
                                <input type="number" step="0.01" class="form-control" id="total_expenses" 
                                       name="total_expenses" value="0">
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="expense_description" class="form-label">Expense Description</label>
                            <textarea class="form-control" id="expense_description" name="expense_description" rows="3"
                                      placeholder="What were the expenses for?"></textarea>
                        </div>
                        
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="review_completed" name="review_completed">
                            <label class="form-check-label" for="review_completed">Mark as reviewed</label>
                        </div>
                        
                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('finance.index') }}" class="btn btn-secondary">
                                <i class="fas fa-arrow-left me-2"></i>Cancel
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save me-2"></i>Save Record
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
