services:
  - type: web
    name: growthos
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:create_app()
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: growthos-db
          property: connectionString

databases:
  - name: growthos-db
    databaseName: growthos
    user: growthos_user